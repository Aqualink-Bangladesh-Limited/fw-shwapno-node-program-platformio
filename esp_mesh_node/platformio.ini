; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1] ;8n
; [env:dfrobot_firebeetle2_esp32s3] ;4n
; [env:esp32dev]

platform = espressif32

board = dfrobot_firebeetle2_esp32s3
; board = esp32dev

framework = arduino
board_build.partitions = partitions_ota.csv


; ; Tell PIO to also scan your Arduino libraries folder
; lib_extra_dirs =
;     C:/Users/mehed/Documents/Arduino/libraries

; ; …but ignore the STM32-only Ethernet lib
; lib_ignore =
;     STM32duino_STM32Ethernet

lib_deps =
    painlessmesh/painlessMesh@^1.5.4    
    crankyoldgit/IRremoteESP8266@^2.8.6
    emelianov/modbus-esp8266@^4.1.0
    ; Portal/OTA (re-enable when using enterPortalMode):
    ; me-no-dev/ESPAsyncWebServer@^1.2.3
    ; bblanchon/ArduinoJson@^6.21.5

; Exclude portal sources while portal is disabled in main.cpp (saves heap for mesh/WiFi).
build_src_filter =
    +<*>
    -<portal_web.cpp>
    -<portal_handler.cpp>
